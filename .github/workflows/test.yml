name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artisyn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/artisyn?schema=public
      JWT_SECRET: your-jwt-secret-key
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      GOOGLE_CALLBACK: http://localhost:3000/api/auth/google/callback
      GOOGLE_CLIENT_ID: xxxxxxx
      GOOGLE_CLIENT_SECRET: xxxxxxx
      FACEBOOK_CALLBACK: http://localhost:3000/api/auth/facebook/callback
      FACEBOOK_CLIENT_ID: xxxxxxx
      FACEBOOK_CLIENT_SECRET: xxxxxxx

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Copy ENV
        run: cp .env.example .env

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      # Database setup: Single migration strategy for CI
      # Using 'prisma migrate deploy' (production-safe) instead of 'prisma migrate dev'
      # This applies all pending migrations in order without creating new ones
      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run database migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/artisyn?schema=public

      - name: Seed database
        run: pnpm prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/artisyn?schema=public

      - name: Run Tests
        run: pnpm test
